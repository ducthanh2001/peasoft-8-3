<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/PeaSoft Vietnam.webp" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>International Women's Day Invitation - March 8th</title>

    <!-- Tailwind CSS CDN + Plugins (forms, container-queries) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@300;400;600&family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind Custom Config -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'pastel-pink': '#FCE4EC',
              'lavender-purple': '#E1BEE7',
              'deep-lavender': '#9575CD',
              'cream-white': '#FFFDF9',
              'shimmer-gold': '#D4AF37',
            },
            fontFamily: {
              serif: ['Playfair Display', 'serif'],
              sans: ['Montserrat', 'sans-serif'],
              script: ['Dancing Script', 'cursive'],
            },
            animation: {
              'bounce-slow': 'bounce 3s infinite',
              float: 'float 6s ease-in-out infinite',
              shimmer: 'shimmer 2.5s linear infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              },
            },
          },
        },
      }
    </script>

    <!-- Extra custom styles & animations -->
    <style>
      @keyframes cardOpenLeft {
        from {
          transform: perspective(1000px) rotateY(0deg);
        }
        to {
          transform: perspective(1000px) rotateY(-110deg);
        }
      }
      @keyframes cardOpenRight {
        from {
          transform: perspective(1000px) rotateY(0deg);
        }
        to {
          transform: perspective(1000px) rotateY(110deg);
        }
      }
      .card-gate-left {
        transform-origin: left;
        transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .card-gate-right {
        transform-origin: right;
        transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .opened .card-gate-left {
        transform: perspective(1500px) rotateY(-130deg);
        opacity: 0;
        pointer-events: none;
      }
      .opened .card-gate-right {
        transform: perspective(1500px) rotateY(130deg);
        opacity: 0;
        pointer-events: none;
      }
      .opened .inner-content {
        opacity: 1;
        transform: scale(1);
      }

      .shimmer-effect {
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.6) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 3s infinite;
      }

      .reveal-section {
        opacity: 0;
        transform: translateY(30px);
        transition: all 0.8s ease-out;
      }
      .reveal-section.visible {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      html {
        scroll-behavior: smooth;
      }

      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #e1bee7;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9575cd;
      }
    </style>
  </head>
  <body class="bg-cream-white text-gray-800 font-sans overflow-x-hidden">
    <div class="w-full" id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
